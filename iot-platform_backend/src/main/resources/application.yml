spring:
  datasource:
    username: root
    password: 123456
    url: jdbc:mysql://localhost:3306/iot_final-training?serverTimezone=UTC
    # ??????druid
    type: com.alibaba.druid.pool.DruidDataSource

    druid:
      # ?????
      # ?????????????
      initial-size: 1
      min-idle: 1
      max-active: 20
      # ?????????????
      max-wait: 3000
      validation-query: SELECT 1 FROM DUAL
      test-on-borrow: false
      test-on-return: false
      test-while-idle: true
      pool-prepared-statements: true
      time-between-eviction-runs-millis: 60000
      min-evictable-idle-time-millis: 300000
      filters: stat,wall,slf4j
      web-stat-filter:
        enabled: true
        url-pattern: /*
        exclusions: "*.js,*.gif,*.jpg,*.png,*.css,*.ico,/druid/*"
      stat-view-servlet:
        enabled: true
        url-pattern: /druid/*
        login-username: admin
        login-password: root
        allow: 127.0.0.1
mybatis-plus:
  global-config:
    db-config:
      id-type: auto
  configuration:
    #开启驼峰映射
    map-underscore-to-camel-case: true
server:
  port: 8084
flea-market:
  path: D:\resource\lea_market_cache\

# 设备模拟器配置
simulator:
  enabled: true           # 是否启用模拟器
  interval-ms: 30000      # 上报间隔(毫秒)，默认30秒，演示时可改为10000(10秒)
