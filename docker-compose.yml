services:
  iot-greenhouse-backend:
    build:
      context: ./iot-platform_backend
      dockerfile: Dockerfile
    container_name: iot-greenhouse-backend
    restart: always
    ports:
      - "1884:1884"
    volumes:
      - ./logs:/app/logs
    env_file:
      - ./iot-platform_backend/.env
    logging:
      driver: "json-file"
      options:
        max-size: "20m"
        max-file: "3"
    networks:
      - core-network

  iot-greenhouse-frontend:
    build:
      context: ./iot-platform_frontend
      dockerfile: Dockerfile
    container_name: iot-greenhouse-frontend
    restart: always
    ports:
      - "8085:80"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
    env_file:
      - ./iot-platform_frontend/.env
    depends_on:
      - iot-greenhouse-backend
    logging:
      driver: "json-file"
      options:
        max-size: "20m"
        max-file: "3"
    networks:
      - core-network

networks:
  core-network:
    external: true
